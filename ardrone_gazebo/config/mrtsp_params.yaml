mrtsp_explorer:
  ros__parameters:
    map_topic: /map
    costmap_topic: /global_costmap/costmap
    local_costmap_topic: /local_costmap/costmap
    navigate_to_pose_action_name: navigate_to_pose
    global_frame: map
    robot_base_frame: base_link
    sigma_s: 2.0
    sigma_r: 30.0
    dilation_kernel_radius_cells: 2
    sensor_effective_range_m: 4.5
    weight_distance_wd: 1.0
    weight_gain_ws: 1.0
    max_linear_speed_vmax: 0.8
    max_angular_speed_wmax: 1.0
    occ_threshold: 50
    min_frontier_size_cells: 20
    publish_debug_topics: true
    planning_rate_hz: 1.0
    frontier_min_goal_distance_m: 0.5
    goal_preemption_on_frontier_opened: false
    goal_preemption_on_blocked_goal: true
    goal_preemption_min_interval_s: 2.0
    goal_preemption_skip_if_within_m: 0.75
    return_to_start_on_complete: false
    frontier_marker_topic: /explore/frontiers
    selected_frontier_topic: /explore/selected_frontier
    optimized_map_topic: /explore/optimized_map
    marker_scale: 0.2
